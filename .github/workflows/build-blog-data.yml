name: Build blog data

on:
  repository_dispatch:
    types: [blog-trigger]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Checkout torp package (for simulations)
        uses: actions/checkout@v6
        with:
          repository: peteowen1/torp
          path: torp

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::arrow
            any::dplyr
            any::tidyr
            any::data.table
            any::cli
            any::devtools
            any::ggplot2
            any::httr
            any::lubridate
            any::mgcv
            any::curl
            any::digest
            any::gh
            any::jsonlite
            any::purrr
            any::rlang
            any::stringi
            any::stringr
            any::tibble
            any::tidyselect
            any::withr

      - name: Download source parquets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p source
          if ! gh release download team_ratings-data -p "team_ratings.parquet" -D source; then
            echo "::error::Failed to download team_ratings.parquet from team_ratings-data release"
            exit 1
          fi

          if ! gh release download ratings-data -p "torp_ratings.parquet" -D source; then
            echo "::error::Failed to download torp_ratings.parquet from ratings-data release"
            exit 1
          fi

          YEAR=$(date +%Y)

          # Predictions (all available seasons)
          if gh release download predictions -p "predictions_*.parquet" -D source; then
            count=$(ls source/predictions_*.parquet 2>/dev/null | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "::error::gh reported success but no predictions files found on disk"
              exit 1
            fi
            echo "Downloaded predictions: ${count} files"
          else
            echo "::error::Failed to download any predictions files"
            exit 1
          fi

          # Retrodictions (backfill for rounds without locked predictions)
          if gh release download retrodictions -p "retrodictions_*.parquet" -D source; then
            count=$(ls source/retrodictions_*.parquet 2>/dev/null | wc -l)
            echo "Downloaded retrodictions: ${count} files"
          else
            echo "::warning::No retrodictions available — only locked predictions will be used"
          fi

          # Player details (latest year for bio data)
          if gh release download player_details-data -p "player_details_${YEAR}.parquet" -D source 2>/dev/null; then
            echo "Downloaded player_details for ${YEAR}"
          elif gh release download player_details-data -p "player_details_$((YEAR-1)).parquet" -D source 2>/dev/null; then
            echo "::warning::Fell back to player_details_$((YEAR-1)).parquet"
          else
            echo "::error::Failed to download player_details for ${YEAR} or $((YEAR-1))"
            exit 1
          fi

          # PBP data (for shot charts — optional, doesn't fail build)
          if gh release download pbp-data -p "pbp_data_*_all.parquet" -D source; then
            count=$(ls source/pbp_data_*_all.parquet 2>/dev/null | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "::warning::pbp-data release exists but contained no pbp_data_*_all.parquet files — shot charts will be skipped"
            else
              echo "Downloaded PBP data: ${count} files"
            fi
          else
            echo "::warning::No PBP data available, shot charts will be skipped"
          fi

          # Per-game ratings (all available seasons for game logs)
          if gh release download player_game_ratings-data -p "player_game_ratings_*.parquet" -D source; then
            count=$(ls source/player_game_ratings_*.parquet 2>/dev/null | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "::error::gh reported success but no player_game_ratings files found on disk"
              exit 1
            fi
            echo "Downloaded game ratings: ${count} files"
          else
            echo "::error::Failed to download any player_game_ratings files"
            exit 1
          fi

          # Raw game stats (box-score stats for match page toggle — optional)
          # Pattern: player_game_YYYY.parquet (NOT player_game_ratings_*)
          if gh release download player_game-data -p "player_game_[0-9]*.parquet" -D source; then
            count=$(ls source/player_game_[0-9]*.parquet 2>/dev/null | wc -l)
            echo "Downloaded raw game stats: ${count} files"
          else
            echo "::warning::No raw game stats available, match stats toggle will be skipped"
          fi

          # Fixtures (all seasons — for venue/date on blog stats pages)
          if gh release download fixtures-data -p "fixtures_*.parquet" -D source; then
            count=$(ls source/fixtures_*.parquet 2>/dev/null | wc -l)
            echo "Downloaded fixtures: ${count} files"
          else
            echo "::warning::No fixtures data available — fixtures-history will be skipped"
          fi

      - name: Aggregate
        run: Rscript scripts/build_blog_data.R

      - name: Download extra parquets for R2
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          YEAR=$(date +%Y)
          mkdir -p blog

          # Teams lineup data → teams-YEAR.parquet
          if gh release download teams-data -p "teams_${YEAR}.parquet" -D blog; then
            SIZE=$(stat -c%s "blog/teams_${YEAR}.parquet")
            if [ "$SIZE" -lt 1000 ]; then
              echo "::warning::teams_${YEAR}.parquet suspiciously small (${SIZE} bytes) — removing"
              rm "blog/teams_${YEAR}.parquet"
            else
              mv "blog/teams_${YEAR}.parquet" "blog/teams-${YEAR}.parquet"
              echo "Downloaded teams_${YEAR}.parquet (${SIZE} bytes) → teams-${YEAR}.parquet"
            fi
          else
            echo "::warning::teams_${YEAR}.parquet not available — lineups won't update"
          fi

          # Player skills → player-skills.parquet
          if gh release download player_skills-data -p "player_skills_${YEAR}.parquet" -D blog; then
            SIZE=$(stat -c%s "blog/player_skills_${YEAR}.parquet")
            if [ "$SIZE" -lt 1000 ]; then
              echo "::warning::player_skills_${YEAR}.parquet suspiciously small (${SIZE} bytes) — removing"
              rm "blog/player_skills_${YEAR}.parquet"
            else
              mv "blog/player_skills_${YEAR}.parquet" "blog/player-skills.parquet"
              echo "Downloaded player_skills_${YEAR}.parquet (${SIZE} bytes) → player-skills.parquet"
            fi
          else
            echo "::warning::player_skills_${YEAR}.parquet not available — skills data won't update"
          fi

      - name: Validate outputs
        run: |
          echo "Files produced:"
          ls -la blog/*.parquet 2>/dev/null || true

          # Required — fail the build if missing
          for f in ratings.parquet team-ratings.parquet predictions.parquet player-details.parquet game-logs.parquet; do
            if [ ! -f "blog/$f" ]; then
              echo "::error::Required output blog/$f was not produced"
              exit 1
            fi
          done

          # Optional — warn but don't fail
          for f in simulations.parquet shots.parquet game-stats.parquet player-skills.parquet; do
            if [ ! -f "blog/$f" ]; then
              echo "::warning::Optional output blog/$f was not produced"
            fi
          done

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials not configured"
            exit 1
          fi
          shopt -s nullglob
          files=(blog/*.parquet)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No parquet files found in blog/ — R aggregation may have failed"
            exit 1
          fi
          retry_upload() {
            local file="$1" key="$2" max_attempts=3 attempt=1
            while [ $attempt -le $max_attempts ]; do
              if wrangler r2 object put "$key" --file "$file" --remote; then
                return 0
              fi
              echo "::warning::Upload attempt $attempt/$max_attempts failed for $key, retrying in $(( 2 ** attempt ))s"
              sleep $(( 2 ** attempt ))
              attempt=$(( attempt + 1 ))
            done
            return 1
          }
          for f in "${files[@]}"; do
            key="inthegame-data/afl/$(basename $f)"
            echo "Uploading $key..."
            if ! retry_upload "$f" "$key"; then
              echo "::error::Failed to upload $key after 3 attempts"
              exit 1
            fi
          done
          echo "Uploaded ${#files[@]} files to R2 (afl/ prefix)"
