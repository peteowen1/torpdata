name: Build blog data

on:
  workflow_dispatch:
  # Uncomment to trigger after your main data pipeline:
  # workflow_run:
  #   workflows: ["Update data"]
  #   types: [completed]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: arrow, dplyr

      - name: Download source parquets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p source
          gh release download team_ratings-data -p "team_ratings.parquet" -D source
          YEAR=$(date +%Y)
          gh release download player_season_ratings-data -p "player_season_ratings_${YEAR}.parquet" -D source || \
            gh release download player_season_ratings-data -p "player_season_ratings_$((YEAR-1)).parquet" -D source
          gh release download predictions -p "predictions_${YEAR}.parquet" -D source || \
            gh release download predictions -p "predictions_$((YEAR-1)).parquet" -D source

      - name: Aggregate
        run: Rscript scripts/build_blog_data.R

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --cached --quiet || git commit -m "Update blog data" && git push
