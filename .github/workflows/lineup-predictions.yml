name: Lineup Detection & Predictions

on:
  schedule:
    # Lineups typically released ~6:00-7:30 PM AEST on Wed/Thu
    - cron: '0 9 * * 3,4'     #  7:00 PM AEST Wed/Thu
    - cron: '0 10 * * 3,4'    #  8:00 PM AEST Wed/Thu
    - cron: '0 11 * * 3,4'    #  9:00 PM AEST Wed/Thu
    - cron: '0 12 * * 3,4'    # 10:00 PM AEST Wed/Thu
    # Friday morning — catch late changes / team announcements
    - cron: '0 22 * * 4'      #  8:00 AM AEST Fri
  workflow_dispatch:

env:
  GITHUB_PAT: ${{ secrets.WORKFLOW_PAT }}
  R_KEEP_PKG_SOURCE: yes

jobs:
  check-lineups:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout torpdata
        uses: actions/checkout@v4

      - name: Checkout torp
        uses: actions/checkout@v4
        with:
          repository: peteowen1/torp
          token: ${{ secrets.WORKFLOW_PAT }}
          path: torp

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: torp
          cache-version: 3
          extra-packages: |
            any::devtools
            any::piggyback
            any::tictoc
            any::mgcv
            any::cli
            any::glue
            any::data.table
            any::janitor
            any::lubridate
          needs: |
            devtools

      - name: Check for new lineups
        id: lineup_check
        working-directory: torp
        run: |
          Rscript -e "
            devtools::load_all()
            has_new <- has_new_team_data()
            cat(paste0('has_new_lineups=', tolower(has_new), '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run team-only release
        if: steps.lineup_check.outputs.has_new_lineups == 'true'
        id: team_release
        working-directory: torp
        run: |
          Rscript -e "
            devtools::load_all()
            source('data-raw/01-data/daily_release.R')
            result <- run_daily_release(force = FALSE)
            release_done <- result != 'none'
            cat(paste0('release_done=', tolower(release_done), '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            cat(paste0('release_mode=', result, '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release info
        if: steps.team_release.outputs.release_done == 'true'
        id: release_info
        working-directory: torp
        run: |
          AFL_SEASON=$(Rscript -e "devtools::load_all(); cat(get_afl_season())")
          AFL_ROUND=$(Rscript -e "devtools::load_all(); cat(get_afl_week())")
          echo "afl_season=$AFL_SEASON" >> $GITHUB_OUTPUT
          echo "afl_round=$AFL_ROUND" >> $GITHUB_OUTPUT

      - name: Dispatch ratings trigger to torp
        if: steps.team_release.outputs.release_done == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          repository: peteowen1/torp
          event-type: ratings-trigger
          client-payload: '{"season": "${{ steps.release_info.outputs.afl_season }}", "round": "${{ steps.release_info.outputs.afl_round }}", "release_mode": "${{ steps.team_release.outputs.release_mode }}"}'

      - name: Summary
        run: |
          {
            if [ "${{ steps.lineup_check.outputs.has_new_lineups }}" = "true" ]; then
              echo "## Lineup Detection - New Lineups Found"
              echo ""
              echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
              echo "**Release mode:** ${{ steps.team_release.outputs.release_mode }}"
              echo "**Season:** ${{ steps.release_info.outputs.afl_season }}"
              echo "**Round:** ${{ steps.release_info.outputs.afl_round }}"
              echo ""
              echo "Dispatched ratings-trigger to peteowen1/torp for updated predictions."
            else
              echo "## Lineup Detection - No Changes"
              echo ""
              echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
              echo ""
              echo "No new lineup data detected. Skipped."
            fi
          } >> $GITHUB_STEP_SUMMARY
