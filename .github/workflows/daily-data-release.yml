name: Daily Data Release

on:
  schedule:
    # AFL games run Thu–Mon. Stats available ~30min after final siren.
    # has_new_games() exits early (~30s) when no new data, so extra runs are cheap.

    # Thursday evening (1-2 games)
    - cron: '30 12 * * 4'   # 10:30 PM AEST — after evening game
    - cron: '30 13 * * 4'   # 11:30 PM AEST — catch late stats

    # Friday (occasional afternoon + evening games)
    - cron: '0 8 * * 5'     #  6:00 PM AEST — after afternoon game if any
    - cron: '30 12 * * 5'   # 10:30 PM AEST — after evening game
    - cron: '30 13 * * 5'   # 11:30 PM AEST — catch late stats

    # Saturday (busiest day: early afternoon through night)
    - cron: '30 5 * * 6'    #  3:30 PM AEST — after 12:35/1:15 PM games
    - cron: '30 7 * * 6'    #  5:30 PM AEST — after ~3:15 PM games
    - cron: '0 10 * * 6'    #  8:00 PM AEST — after twilight games
    - cron: '30 12 * * 6'   # 10:30 PM AEST — after night games
    - cron: '30 13 * * 6'   # 11:30 PM AEST — catch late stats

    # Sunday (multiple afternoon/evening games)
    - cron: '30 5 * * 0'    #  3:30 PM AEST — after early games
    - cron: '30 7 * * 0'    #  5:30 PM AEST — after afternoon games
    - cron: '0 10 * * 0'    #  8:00 PM AEST — after twilight games
    - cron: '30 12 * * 0'   # 10:30 PM AEST — after evening games

    # Monday (occasional public holiday games)
    - cron: '0 8 * * 1'     #  6:00 PM AEST — after afternoon games
    - cron: '0 10 * * 1'    #  8:00 PM AEST — catch late games

    # Daily safety net
    - cron: '0 16 * * *'    #  2:00 AM AEST — catches anything missed overnight
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release (skip new games check)'
        type: boolean
        default: false
      rebuild_aggregates:
        description: 'Rebuild all historical aggregated files (2021-present)'
        type: boolean
        default: false

concurrency:
  group: daily-release
  cancel-in-progress: true

env:
  GITHUB_PAT: ${{ secrets.WORKFLOW_PAT }}
  R_KEEP_PKG_SOURCE: yes

jobs:
  release-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout torpdata
        uses: actions/checkout@v6

      - name: Checkout torp
        uses: actions/checkout@v6
        with:
          repository: peteowen1/torp
          token: ${{ secrets.WORKFLOW_PAT }}
          path: torp

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: torp
          cache-version: 3
          extra-packages: |
            any::devtools
            any::piggyback
            any::tictoc
            any::mgcv
            any::cli
            any::glue
            any::data.table
            any::janitor
            any::lubridate
          needs: |
            devtools

      - name: Run daily release
        id: daily_release
        working-directory: torp
        run: |
          Rscript -e "
            devtools::load_all()
            source('data-raw/01-data/daily_release.R')
            force <- as.logical(Sys.getenv('FORCE_RELEASE', 'FALSE'))
            result <- run_daily_release(force = force)
            if (!is.character(result) || length(result) != 1 ||
                !result %in% c('full', 'team_only', 'none')) {
              stop('run_daily_release() returned unexpected value: ', result)
            }
            release_done <- result != 'none'
            cat(paste0('release_done=', tolower(release_done), '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            cat(paste0('release_mode=', result, '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_RELEASE: ${{ inputs.force_release || 'FALSE' }}

      - name: Verify release uploads
        if: steps.daily_release.outputs.release_done == 'true'
        id: verify_release
        working-directory: torp
        run: |
          SEASON=$(Rscript -e "devtools::load_all(); cat(get_afl_season())")
          RELEASE_MODE="${{ steps.daily_release.outputs.release_mode }}"
          MAX_AGE_HOURS=24

          echo "Release mode: $RELEASE_MODE"

          if [ "$RELEASE_MODE" = "team_only" ]; then
            FILES="teams-data:teams_${SEASON}.parquet"
          else
            FILES="pbp-data:pbp_data_${SEASON}_all.parquet chains-data:chains_data_${SEASON}_all.parquet player_stats-data:player_stats_${SEASON}.parquet"
          fi

          verified=0
          total=0

          for entry in $FILES; do
            tag="${entry%%:*}"
            file="${entry##*:}"
            total=$((total + 1))

            # Query asset updated_at via gh release view
            updated_at=$(gh release view "$tag" \
              --repo peteowen1/torpdata \
              --json assets \
              --jq ".assets[] | select(.name == \"$file\") | .updatedAt" 2>/dev/null || true)

            if [ -z "$updated_at" ]; then
              echo "Skipped: $file - not found in $tag release (pre-season or no data)"
              continue
            fi

            # Check freshness
            upload_epoch=$(date -d "$updated_at" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$updated_at" +%s 2>/dev/null)
            now_epoch=$(date +%s)
            age_hours=$(( (now_epoch - upload_epoch) / 3600 ))

            if [ "$age_hours" -gt "$MAX_AGE_HOURS" ]; then
              echo "Stale: $file - last updated ${age_hours}h ago"
              continue
            fi

            echo "Verified: $file - uploaded ${age_hours}h ago"
            verified=$((verified + 1))
          done

          if [ "$verified" -eq 0 ]; then
            echo "No fresh critical files found. Skipping downstream dispatch."
            echo "release_verified=false" >> "$GITHUB_OUTPUT"
          else
            echo "Verified $verified of $total critical files."
            echo "release_verified=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild historical aggregates
        if: inputs.rebuild_aggregates && steps.daily_release.outcome == 'success'
        working-directory: torp
        run: Rscript data-raw/01-data/create_aggregated_files.R
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release info
        if: steps.daily_release.outputs.release_done == 'true'
        id: release_info
        working-directory: torp
        run: |
          AFL_SEASON=$(Rscript -e "devtools::load_all(); cat(get_afl_season())")
          AFL_ROUND=$(Rscript -e "devtools::load_all(); cat(get_afl_week())")
          echo "afl_season=$AFL_SEASON" >> $GITHUB_OUTPUT
          echo "afl_round=$AFL_ROUND" >> $GITHUB_OUTPUT

      - name: Dispatch ratings trigger to torp
        if: steps.verify_release.outputs.release_verified == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          repository: peteowen1/torp
          event-type: ratings-trigger
          client-payload: '{"season": "${{ steps.release_info.outputs.afl_season }}", "round": "${{ steps.release_info.outputs.afl_round }}", "release_mode": "${{ steps.daily_release.outputs.release_mode }}"}'

      - name: Create release summary
        if: steps.daily_release.outputs.release_done == 'true'
        run: |
          {
            echo "## Daily Data Release Summary"
            echo ""
            echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
            echo "**AFL Season:** $AFL_SEASON"
            echo "**AFL Round:** $AFL_ROUND"
            echo ""
            echo "### Data Updated"
            echo "- Chains data (per-round + aggregated)"
            echo "- Play-by-play data (per-round + aggregated)"
            echo "- Expected goals (xG) data"
            echo "- Player statistics"
            echo "- Fixtures"
            echo "- Results"
            echo "- Team lineups"
            echo "- Player details"
            echo ""
            echo "### Downstream"
            echo "- Dispatched ratings-trigger to peteowen1/torp"
            echo ""
            echo "### Force Flags"
            echo "- Force release: $FORCE_RELEASE"
            echo "- Rebuild aggregates: $REBUILD_AGGREGATES"
          } >> $GITHUB_STEP_SUMMARY
        env:
          AFL_SEASON: ${{ steps.release_info.outputs.afl_season }}
          AFL_ROUND: ${{ steps.release_info.outputs.afl_round }}
          FORCE_RELEASE: ${{ inputs.force_release || false }}
          REBUILD_AGGREGATES: ${{ inputs.rebuild_aggregates || false }}

      - name: No-data summary
        if: steps.daily_release.outcome == 'success' && steps.daily_release.outputs.release_done != 'true'
        run: |
          {
            echo "## Daily Data Release - No New Data"
            echo ""
            echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "No new games or lineup changes detected. Release skipped."
            echo "This is expected during the off-season or between rounds."
          } >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily Data Release Failed';
            const body = `The daily data release workflow failed on ${new Date().toISOString()}.

            **Details:**
            - Season: ${{ steps.release_info.outputs.afl_season || 'unknown' }}
            - Round: ${{ steps.release_info.outputs.afl_round || 'unknown' }}

            Please check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.

            **Troubleshooting:**
            1. Check if AFL API is accessible
            2. Verify WORKFLOW_PAT has write permissions to torpdata releases
            3. Review error logs for specific data type failures

            **Manual Recovery:**
            - Run workflow manually with "Force release" checked`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation,bug'
            });

            const existingIssue = issues.data.find(i => i.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Workflow failed again on ${new Date().toISOString()}.\n\n[View run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'automation']
              });
            }
