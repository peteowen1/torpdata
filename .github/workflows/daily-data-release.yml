name: Daily Data Release

on:
  schedule:
    # Run at 2:00 AM AEST (16:00 UTC previous day)
    # This timing catches late Monday night games
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release (skip new games check)'
        type: boolean
        default: false
      rebuild_aggregates:
        description: 'Rebuild all historical aggregated files (2021-present)'
        type: boolean
        default: false

env:
  GITHUB_PAT: ${{ secrets.WORKFLOW_PAT }}
  R_KEEP_PKG_SOURCE: yes

jobs:
  release-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout torpdata
        uses: actions/checkout@v4

      - name: Checkout torp
        uses: actions/checkout@v4
        with:
          repository: peteowen1/torp
          token: ${{ secrets.WORKFLOW_PAT }}
          path: torp

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: torp
          cache-version: 3
          extra-packages: |
            any::devtools
            any::piggyback
            any::fitzRoy
            any::tictoc
            any::mgcv
            any::cli
            any::glue
            any::data.table
            any::janitor
            any::lubridate
          needs: |
            devtools

      - name: Run daily release
        id: daily_release
        working-directory: torp
        run: |
          Rscript -e "
            devtools::load_all()
            source('data-raw/01-data/daily_release.R')
            force <- as.logical(Sys.getenv('FORCE_RELEASE', 'FALSE'))
            result <- run_daily_release(force = force)
            if (!is.character(result) || length(result) != 1 ||
                !result %in% c('full', 'team_only', 'none')) {
              stop('run_daily_release() returned unexpected value: ', result)
            }
            release_done <- result != 'none'
            cat(paste0('release_done=', tolower(release_done), '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            cat(paste0('release_mode=', result, '\n'),
                file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_RELEASE: ${{ inputs.force_release || 'FALSE' }}

      - name: Verify release uploads
        if: steps.daily_release.outputs.release_done == 'true'
        id: verify_release
        working-directory: torp
        run: |
          Rscript -e "
            season <- as.integer(format(Sys.Date(), '%Y'))
            release_mode <- '${{ steps.daily_release.outputs.release_mode }}'

            if (release_mode == 'team_only') {
              expected <- list(
                list(file = paste0('teams_', season, '.parquet'), tag = 'teams-data')
              )
            } else {
              expected <- list(
                list(file = paste0('pbp_data_', season, '_all.parquet'),    tag = 'pbp-data'),
                list(file = paste0('chains_data_', season, '_all.parquet'), tag = 'chains-data'),
                list(file = paste0('player_stats_', season, '.parquet'),    tag = 'player_stats-data')
              )
            }

            cat('Release mode:', release_mode, '\n')

            max_age_hours <- 24
            verified <- 0L

            for (e in expected) {
              releases <- tryCatch(
                piggyback::pb_list(repo = 'peteowen1/torpdata', tag = e[['tag']]),
                error = function(err) {
                  stop('GitHub API error querying ', e[['tag']], ' release. ',
                       'This may be transient -- re-run the workflow. ',
                       'Original error: ', conditionMessage(err))
                }
              )

              file_row <- releases[releases[['file_name']] == e[['file']], ]
              if (nrow(file_row) == 0) {
                cat('Skipped:', e[['file']], '- not found (pre-season or no data)\n')
                next
              }

              upload_time <- as.POSIXct(file_row[['timestamp']][1], tz = 'UTC')
              age_hours <- as.numeric(difftime(Sys.time(), upload_time, units = 'hours'))
              if (age_hours > max_age_hours) {
                cat('Stale:', e[['file']], '- last updated', round(age_hours), 'hours ago\n')
                next
              }

              cat('Verified:', e[['file']], '- uploaded', round(age_hours, 1), 'hours ago\n')
              verified <- verified + 1L
            }

            if (verified == 0L) {
              cat('No fresh critical files found. Skipping downstream dispatch.\n')
              cat('release_verified=false\n', file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            } else {
              cat('Verified', verified, 'of', length(expected), 'critical files.\n')
              cat('release_verified=true\n', file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            }
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild historical aggregates
        if: inputs.rebuild_aggregates && steps.daily_release.outcome == 'success'
        working-directory: torp
        run: Rscript data-raw/01-data/create_aggregated_files.R
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release info
        if: steps.daily_release.outputs.release_done == 'true'
        id: release_info
        working-directory: torp
        run: |
          AFL_SEASON=$(Rscript -e "devtools::load_all(); cat(get_afl_season())")
          AFL_ROUND=$(Rscript -e "devtools::load_all(); cat(get_afl_week())")
          echo "afl_season=$AFL_SEASON" >> $GITHUB_OUTPUT
          echo "afl_round=$AFL_ROUND" >> $GITHUB_OUTPUT

      - name: Dispatch ratings trigger to torp
        if: steps.verify_release.outputs.release_verified == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          repository: peteowen1/torp
          event-type: ratings-trigger
          client-payload: '{"season": "${{ steps.release_info.outputs.afl_season }}", "round": "${{ steps.release_info.outputs.afl_round }}", "release_mode": "${{ steps.daily_release.outputs.release_mode }}"}'

      - name: Create release summary
        if: steps.daily_release.outputs.release_done == 'true'
        run: |
          {
            echo "## Daily Data Release Summary"
            echo ""
            echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
            echo "**AFL Season:** $AFL_SEASON"
            echo "**AFL Round:** $AFL_ROUND"
            echo ""
            echo "### Data Updated"
            echo "- Chains data (per-round + aggregated)"
            echo "- Play-by-play data (per-round + aggregated)"
            echo "- Expected goals (xG) data"
            echo "- Player statistics"
            echo "- Fixtures"
            echo "- Results"
            echo "- Team lineups"
            echo "- Player details"
            echo ""
            echo "### Downstream"
            echo "- Dispatched ratings-trigger to peteowen1/torp"
            echo ""
            echo "### Force Flags"
            echo "- Force release: $FORCE_RELEASE"
            echo "- Rebuild aggregates: $REBUILD_AGGREGATES"
          } >> $GITHUB_STEP_SUMMARY
        env:
          AFL_SEASON: ${{ steps.release_info.outputs.afl_season }}
          AFL_ROUND: ${{ steps.release_info.outputs.afl_round }}
          FORCE_RELEASE: ${{ inputs.force_release || false }}
          REBUILD_AGGREGATES: ${{ inputs.rebuild_aggregates || false }}

      - name: No-data summary
        if: steps.daily_release.outcome == 'success' && steps.daily_release.outputs.release_done != 'true'
        run: |
          {
            echo "## Daily Data Release - No New Data"
            echo ""
            echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "No new games or lineup changes detected. Release skipped."
            echo "This is expected during the off-season or between rounds."
          } >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily Data Release Failed';
            const body = `The daily data release workflow failed on ${new Date().toISOString()}.

            **Details:**
            - Season: ${{ steps.release_info.outputs.afl_season || 'unknown' }}
            - Round: ${{ steps.release_info.outputs.afl_round || 'unknown' }}

            Please check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.

            **Troubleshooting:**
            1. Check if fitzRoy API is accessible
            2. Verify WORKFLOW_PAT has write permissions to torpdata releases
            3. Review error logs for specific data type failures

            **Manual Recovery:**
            - Run workflow manually with "Force release" checked`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation,bug'
            });

            const existingIssue = issues.data.find(i => i.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Workflow failed again on ${new Date().toISOString()}.\n\n[View run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'automation']
              });
            }
